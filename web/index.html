<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会后行动派 — 让会议结论变成可执行的任务</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ========== 导航栏 ========== -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="#demo" class="logo">
      <span class="logo-icon">会</span>
      <span>会后行动派</span>
    </a>
  </div>
</nav>

<!-- ========== 工作台 ========== -->
<section class="workspace" id="demo">
  <div class="container">
    <!-- 编辑感栏目标题 -->
    <div class="workspace-header">
      <h1 class="workspace-title">
        <span class="num">No.01</span>
        行动派 · 工作台
      </h1>
      <span class="workspace-meta">Meeting to Action</span>
    </div>
    <div class="demo-wrap">
      <div class="demo-body">
        <!-- 左侧输入 -->
        <div class="demo-input-panel">
          <div class="scene-selector" id="sceneSelector">
            <button class="scene-btn active" data-scene="meeting">会议纪要</button>
            <button class="scene-btn" data-scene="chat">群聊记录</button>
            <button class="scene-btn" data-scene="assignment">任务布置</button>
          </div>
          <div class="demo-input-label">
            <span id="inputLabel">会议内容输入区</span>
            <div class="demo-input-tools">
              <button class="demo-tool-btn" id="sampleBtn">示例</button>
              <button class="demo-tool-btn" id="clearBtn">清空</button>
            </div>
          </div>
          <textarea class="demo-textarea" id="inputArea" placeholder="把会议纪要粘贴到这里..."></textarea>
          <div class="input-footer">
            <span class="privacy-tip">请勿粘贴含敏感商业信息或个人隐私的内容</span>
            <span class="char-count" id="charCount">0 / 2000</span>
          </div>
          <button class="demo-generate-btn" id="generateBtn">
            <span class="spinner"></span>
            <span class="btn-text">生成方案</span>
          </button>
        </div>
        <!-- 右侧输出 -->
        <div class="demo-output-panel">
          <div class="output-tabs">
            <button class="output-tab active" data-tab="tasks">任务清单</button>
            <button class="output-tab" data-tab="risks">风险提醒</button>
            <button class="output-tab" data-tab="message">跟进消息</button>
            <button class="output-tab" data-tab="report">汇报草稿</button>
          </div>
          <div class="output-content" id="outputContent">
            <div class="output-empty">
              <div class="output-empty-icon">§</div>
              <p>在左侧粘贴会议内容并点击"生成方案"<br>这里将展示结构化的行动方案</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ========== 页脚 ========== -->
<footer class="footer">
  <div class="container">
    <span>会后行动派 · 让会议结论变成可执行的任务</span>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
